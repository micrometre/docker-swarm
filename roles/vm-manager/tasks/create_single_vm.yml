---
# Tasks for creating a single VM (used in loops)

- name: Set VM variables from loop item
  set_fact:
    current_vm_name: "{{ vm_item.value.vm_name }}"
    current_vm_hostname: "{{ vm_item.value.vm_hostname }}"
    current_vm_ram: "{{ vm_item.value.vm_ram }}"
    current_vm_vcpus: "{{ vm_item.value.vm_vcpus }}"
    current_vm_disk_size: "{{ vm_item.value.vm_disk_size }}"
    current_vm_static_ip: "{{ vm_item.value.vm_static_ip }}"
    current_vm_workspace_dir: "{{ work_directory }}/{{ vm_item.value.vm_name }}"

- name: Create VM-specific workspace directory
  file:
    path: "{{ current_vm_workspace_dir }}"
    state: directory
    mode: '0755'

- name: Copy Ubuntu cloud image from shared directory to VM workspace
  copy:
    src: "{{ shared_images_dir }}/{{ ubuntu_cloud_image_filename }}"
    dest: "{{ current_vm_workspace_dir }}/{{ ubuntu_cloud_image_filename }}"
    mode: '0644'
    remote_src: yes

- name: Create VM disk image
  shell: >
    qemu-img create -b {{ current_vm_workspace_dir }}/{{ ubuntu_cloud_image_filename }}
    -f qcow2 -F qcow2 {{ current_vm_workspace_dir }}/{{ current_vm_name }}.img {{ current_vm_disk_size }}
  args:
    creates: "{{ current_vm_workspace_dir }}/{{ current_vm_name }}.img"

- name: Create cloud-init user-data
  template:
    src: user-data.j2
    dest: "{{ current_vm_workspace_dir }}/user-data"
    mode: '0644'
  vars:
    vm_hostname: "{{ current_vm_hostname }}"
    vm_static_ip: "{{ current_vm_static_ip }}"
    vm_gateway: "192.168.122.1"
    vm_dns_servers: ["8.8.8.8", "8.8.4.4"]

- name: Create cloud-init meta-data
  template:
    src: meta-data.j2
    dest: "{{ current_vm_workspace_dir }}/meta-data"
    mode: '0644'
  vars:
    vm_hostname: "{{ current_vm_hostname }}"

- name: Create cloud-init network-config
  template:
    src: network-config.j2
    dest: "{{ current_vm_workspace_dir }}/network-config"
    mode: '0644'
  vars:
    vm_static_ip: "{{ current_vm_static_ip }}"

- name: Create cloud-init ISO
  shell: >
    genisoimage -output {{ current_vm_workspace_dir }}/cidata.iso 
    -V cidata -r -J {{ current_vm_workspace_dir }}/user-data {{ current_vm_workspace_dir }}/meta-data {{ current_vm_workspace_dir }}/network-config
  args:
    creates: "{{ current_vm_workspace_dir }}/cidata.iso"

- name: Check if VM already exists
  shell: virsh list --all | grep -q "{{ current_vm_name }}"
  register: vm_exists
  failed_when: false
  changed_when: false

- name: Stop and remove existing VM if force_recreate is true
  block:
    - name: Shutdown existing VM
      shell: virsh shutdown {{ current_vm_name }}
      ignore_errors: yes
      when: vm_exists.rc == 0

    - name: Wait for VM shutdown
      wait_for:
        timeout: 30
      when: vm_exists.rc == 0

    - name: Force destroy VM if still running
      shell: virsh destroy {{ current_vm_name }}
      ignore_errors: yes
      when: vm_exists.rc == 0

    - name: Remove existing VM
      shell: virsh undefine {{ current_vm_name }} --remove-all-storage
      when: vm_exists.rc == 0

  when: 
    - force_recreate
    - vm_exists.rc == 0

- name: Fail if VM exists and force_recreate is false
  fail:
    msg: "VM '{{ current_vm_name }}' already exists. Set force_recreate=true to recreate it."
  when:
    - vm_exists.rc == 0
    - not force_recreate

- name: Ensure libvirt images directory exists
  file:
    path: "{{ libvirt_images_path }}"
    state: directory
    owner: libvirt-qemu
    group: libvirt-qemu
    mode: '0755'
  become: yes

- name: Copy base image to libvirt storage
  copy:
    src: "{{ current_vm_workspace_dir }}/{{ ubuntu_cloud_image_filename }}"
    dest: "{{ libvirt_images_path }}/{{ ubuntu_cloud_image_filename }}"
    owner: libvirt-qemu
    group: libvirt-qemu
    mode: '0644'
    remote_src: yes
  become: yes

- name: Create VM disk in libvirt storage
  shell: >
    qemu-img create -b {{ libvirt_images_path }}/{{ ubuntu_cloud_image_filename }}
    -f qcow2 -F qcow2 {{ libvirt_images_path }}/{{ current_vm_name }}.img {{ current_vm_disk_size }}
  become: yes

- name: Set ownership of VM disk
  file:
    path: "{{ libvirt_images_path }}/{{ current_vm_name }}.img"
    owner: libvirt-qemu
    group: libvirt-qemu
    mode: '0644'
  become: yes

- name: Copy cloud-init ISO to libvirt storage
  copy:
    src: "{{ current_vm_workspace_dir }}/cidata.iso"
    dest: "{{ libvirt_images_path }}/cidata-{{ current_vm_name }}.iso"
    owner: libvirt-qemu
    group: libvirt-qemu
    mode: '0644'
    remote_src: yes
  become: yes

- name: Create VM
  shell: >
    virt-install --name={{ current_vm_name }} --ram={{ current_vm_ram }} --vcpus={{ current_vm_vcpus }} --import
    --disk path={{ libvirt_images_path }}/{{ current_vm_name }}.img,format=qcow2
    --disk path={{ libvirt_images_path }}/cidata-{{ current_vm_name }}.iso,device=cdrom
    --os-variant={{ vm_os_variant }}
    --network {{ vm_network }}
    --graphics {{ vm_graphics }}
    --noautoconsole
  register: vm_creation_result

- name: Display VM creation result
  debug:
    msg: "VM '{{ current_vm_name }}' created successfully!"

- name: Get VM status
  shell: virsh list --all | grep {{ current_vm_name }}
  register: vm_status
  changed_when: false

- name: Display VM status
  debug:
    msg: "{{ vm_status.stdout }}"

- name: Create VM inventory entry
  blockinfile:
    path: "{{ current_vm_workspace_dir }}/vm_inventory.yml"
    create: yes
    marker: "# {mark} ANSIBLE MANAGED BLOCK - {{ current_vm_name }}"
    mode: '0644'
    block: |
      {{ current_vm_name }}:
        ansible_host: {{ current_vm_static_ip }}
        ansible_user: {{ vm_user }}
        ansible_ssh_private_key_file: "{{ ssh_private_key_path | default('~/.ssh/id_rsa') }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        vm_created: "{{ ansible_date_time.iso8601 }}"
        vm_ram: {{ current_vm_ram }}
        vm_vcpus: {{ current_vm_vcpus }}
        vm_disk_size: "{{ current_vm_disk_size }}"
        vm_os_variant: "{{ vm_os_variant }}"
        description: "VM created via ANPR service integration"

- name: Create individual VM inventory file
  copy:
    content: |
      # Individual inventory for VM: {{ current_vm_name }}
      # Created: {{ ansible_date_time.iso8601 }}
      all:
        children:
          created_vms:
            hosts:
              {{ current_vm_name }}:
                ansible_host: {{ current_vm_static_ip }}
                ansible_user: ubuntu
                ansible_ssh_private_key_file: "~/.ssh/id_rsa"
                ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
                vm_created: "{{ ansible_date_time.iso8601 }}"
                vm_ram: {{ current_vm_ram }}
                vm_vcpus: {{ current_vm_vcpus }}
                vm_disk_size: "{{ current_vm_disk_size }}"
                vm_os_variant: "{{ vm_os_variant }}"
                description: "VM created via ANPR service integration"
    dest: "{{ playbook_dir }}/inventory/vm-{{ current_vm_name }}.yml"
    mode: '0644'

- name: Check if master created_vms.yml exists
  stat:
    path: "{{ playbook_dir }}/inventory/created_vms.yml"
  register: master_inventory_stat

- name: Initialize master inventory if it doesn't exist
  copy:
    content: |
      # Master inventory for all created VMs
      # Updated: {{ ansible_date_time.iso8601 }}
      all:
        children:
          created_vms:
            hosts:
    dest: "{{ playbook_dir }}/inventory/created_vms.yml"
    mode: '0644'
  when: not master_inventory_stat.stat.exists

- name: Add VM to master created_vms inventory
  blockinfile:
    path: "{{ playbook_dir }}/inventory/created_vms.yml"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - {{ current_vm_name }}"
    insertafter: "hosts:"
    block: |
        {{ current_vm_name }}:
          ansible_host: {{ current_vm_static_ip }}
          ansible_user: ubuntu
          ansible_ssh_private_key_file: "~/.ssh/id_rsa"
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          vm_created: "{{ ansible_date_time.iso8601 }}"
          vm_ram: {{ current_vm_ram }}
          vm_vcpus: {{ current_vm_vcpus }}
          vm_disk_size: "{{ current_vm_disk_size }}"
          vm_os_variant: "{{ vm_os_variant }}"
          description: "VM created via ANPR service integration"
    mode: '0644'

- name: Display connection information for {{ current_vm_name }}
  debug:
    msg: |
      VM created successfully!
      Name: {{ current_vm_name }}
      RAM: {{ current_vm_ram }}MB
      vCPUs: {{ current_vm_vcpus }}
      Static IP: {{ current_vm_static_ip }}
      Gateway: {{ vm_gateway }}
      DNS Servers: {{ vm_dns_servers }}
      
      VM workspace: {{ current_vm_workspace_dir }}
      Contains:
      - {{ ubuntu_cloud_image_filename }} (Ubuntu cloud image - copied from shared cache)
      - {{ current_vm_name }}.img (VM disk image)
      - user-data, meta-data (cloud-init config)
      - cidata.iso (cloud-init ISO)
      - vm_inventory.yml (Individual VM inventory)
      
      You can connect via:
      - VNC (check 'virsh vncdisplay {{ current_vm_name }}')
      - SSH: ssh ubuntu@{{ current_vm_static_ip }}
      
      To get VM IP: virsh domifaddr {{ current_vm_name }}
      To access console: virsh console {{ current_vm_name }}
      
      To run ansible against this VM only:
      ansible-playbook -i {{ playbook_dir }}/inventory/vm-{{ current_vm_name }}.yml your-playbook.yml
