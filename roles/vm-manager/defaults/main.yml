---
# Default variables for vm-manager role

# VM configuration - now supports multiple VMs
vms:
  docker_swarm_vm1:
    vm_name: docker_swarm1
    vm_hostname: docker_swarm1
    vm_ram: 8048
    vm_vcpus: 2
    vm_disk_size: 20G
    vm_static_ip: "192.168.122.101"
  docker_swarm_vm2:
    vm_name: docker_swarm2
    vm_hostname: docker_swarm2
    vm_ram: 8048
    vm_vcpus: 2
    vm_disk_size: 20G
    vm_static_ip: "192.168.122.102"

# Legacy single VM support (for backward compatibility)
vm_name: "{{ vms.keys() | first if vms is defined else 'docker_swarm' }}"
vm_hostname: "{{ vms[vm_name].vm_hostname if vms is defined and vm_name in vms else 'docker_swarm' }}"
vm_ram: "{{ vms[vm_name].vm_ram if vms is defined and vm_name in vms else 2048 }}"
vm_vcpus: "{{ vms[vm_name].vm_vcpus if vms is defined and vm_name in vms else 1 }}"
vm_disk_size: "{{ vms[vm_name].vm_disk_size if vms is defined and vm_name in vms else '10G' }}"
vm_static_ip: "{{ vms[vm_name].vm_static_ip if vms is defined and vm_name in vms else '192.168.122.100' }}"

# Ubuntu cloud image settings
ubuntu_version: noble
ubuntu_cloud_image_url: "http://cloud-images.ubuntu.com/{{ ubuntu_version }}/current/{{ ubuntu_version }}-server-cloudimg-amd64.img"
ubuntu_cloud_image_filename: "{{ ubuntu_version }}-server-cloudimg-amd64.img"

# Libvirt storage paths
libvirt_images_path: /var/lib/libvirt/images
work_directory: "{{ ansible_env.HOME }}/vm-workspace"
vm_workspace_dir: "{{ work_directory }}/{{ vm_name }}"
shared_images_dir: "{{ ansible_env.HOME }}/vm-images"

# Network configuration
vm_network: bridge=virbr0,model=virtio
vm_graphics: vnc,listen=0.0.0.0
vm_os_variant: ubuntu20.04

# VM IP configuration (static only)
vm_static_ip: "192.168.122.100"
vm_gateway: "192.168.122.1"
vm_netmask: "255.255.255.0"
vm_dns_servers:
  - "8.8.8.8"
  - "8.8.4.4"

# Cloud-init configuration
vm_user: ubuntu
vm_user_shell: /bin/bash
vm_user_groups: 
  - sudo

# SSH configuration - will be auto-detected if not specified
ssh_public_key_file: ""
generate_ssh_key: true

# VM management
force_recreate: false
cleanup_on_failure: true